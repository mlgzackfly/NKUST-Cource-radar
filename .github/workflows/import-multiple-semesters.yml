name: Import Multiple Semesters

on:
  workflow_dispatch:
    inputs:
      semesters:
        description: '要匯入的學期（格式: 113-1,113-2,114-1）'
        required: true
        default: '114-1'
        type: string
      skip_existing:
        description: '跳過已存在的學期'
        required: false
        default: true
        type: boolean

jobs:
  # 第一個 job：解析學期列表，生成 matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - name: 📋 Parse semesters into matrix
        id: set-matrix
        run: |
          SEMESTERS="${{ inputs.semesters }}"

          # 將逗號分隔的學期轉換為 JSON array
          JSON_ARRAY=$(echo "$SEMESTERS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "matrix={\"semester\":$JSON_ARRAY}" >> $GITHUB_OUTPUT

          COUNT=$(echo "$JSON_ARRAY" | jq '. | length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "準備匯入 $COUNT 個學期"
          echo "Matrix: $JSON_ARRAY"

  # 第二個 job：並行處理每個學期
  import:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 每個學期最多 3 小時
    strategy:
      fail-fast: false  # 一個失敗不影響其他
      max-parallel: 3   # 最多同時執行 3 個
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Generate Prisma Client
        run: npx prisma generate

      - name: 📚 Parse semester
        id: parse
        run: |
          SEMESTER="${{ matrix.semester }}"
          YEAR=$(echo "$SEMESTER" | cut -d'-' -f1)
          TERM=$(echo "$SEMESTER" | cut -d'-' -f2)

          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "term=$TERM" >> $GITHUB_OUTPUT
          echo "處理: $YEAR 學年度第 $TERM 學期"

      - name: 🔍 Check existing data
        id: check
        if: ${{ inputs.skip_existing }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          YEAR="${{ steps.parse.outputs.year }}"
          TERM="${{ steps.parse.outputs.term }}"

          EXISTING=$(psql "$DATABASE_URL" -t -c "
            SELECT COUNT(*)
            FROM \"Course\"
            WHERE year = '$YEAR' AND term = '$TERM';
          " | tr -d ' ')

          echo "existing=$EXISTING" >> $GITHUB_OUTPUT

          if [ "$EXISTING" -gt 0 ]; then
            echo "⏭️ 已存在 $EXISTING 筆資料"
          fi

      - name: 🕷️ Scrape data
        if: ${{ !inputs.skip_existing || steps.check.outputs.existing == '0' }}
        env:
          NKUST_YEAR: ${{ steps.parse.outputs.year }}
          NKUST_TERM: ${{ steps.parse.outputs.term }}
        run: |
          echo "🕷️ 開始爬取 ${{ matrix.semester }}..."
          npm run scrape:nkust-stdsys
          echo "✓ 爬取完成"

      - name: 💾 Import to database
        if: ${{ !inputs.skip_existing || steps.check.outputs.existing == '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NKUST_IMPORT_YEAR: ${{ steps.parse.outputs.year }}
          NKUST_IMPORT_TERM: ${{ steps.parse.outputs.term }}
        run: |
          echo "💾 開始匯入..."
          npm run db:import:nkust-stdsys
          echo "✓ 匯入完成"

      - name: 📊 Verify import
        if: ${{ !inputs.skip_existing || steps.check.outputs.existing == '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          YEAR="${{ steps.parse.outputs.year }}"
          TERM="${{ steps.parse.outputs.term }}"

          COUNT=$(psql "$DATABASE_URL" -t -c "
            SELECT COUNT(*)
            FROM \"Course\"
            WHERE year = '$YEAR' AND term = '$TERM';
          " | tr -d ' ')

          echo "📈 ${{ matrix.semester }} 匯入課程數: $COUNT"

      - name: ⏭️ Skip message
        if: ${{ inputs.skip_existing && steps.check.outputs.existing != '0' }}
        run: |
          echo "⏭️ 跳過 ${{ matrix.semester }}，已存在 ${{ steps.check.outputs.existing }} 筆資料"

  # 第三個 job：統計結果
  summary:
    needs: [prepare, import]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📊 Final Summary
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "========================================="
          echo "📊 批次匯入完成"
          echo "========================================="
          echo "處理學期數: ${{ needs.prepare.outputs.count }}"
          echo ""

          # 查詢總資料量
          TOTAL_COURSES=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM \"Course\";" | tr -d ' ')
          TOTAL_INSTRUCTORS=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM \"Instructor\";" | tr -d ' ')

          echo "資料庫總計："
          echo "  課程總數: $TOTAL_COURSES"
          echo "  教師總數: $TOTAL_INSTRUCTORS"
          echo ""

          # 按學期統計
          echo "各學期課程數："
          psql "$DATABASE_URL" -c "
            SELECT year || '-' || term as semester,
                   COUNT(*) as courses
            FROM \"Course\"
            GROUP BY year, term
            ORDER BY year DESC, term DESC
            LIMIT 20;
          "
