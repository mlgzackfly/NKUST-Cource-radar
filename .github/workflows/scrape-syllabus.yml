name: Scrape Course Syllabus

on:
  workflow_dispatch:
    inputs:
      year:
        description: '學年度 (例如: 114)'
        required: true
        default: '114'
        type: string
      term:
        description: '學期'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'

jobs:
  scrape-syllabus:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 小時超時限制

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Generate Prisma Client
        run: npx prisma generate

      - name: 🕷️ Scrape courses with syllabus (legacy scraper)
        env:
          NKUST_AG202_YMS_YMS: ${{ inputs.year }}#${{ inputs.term }}
          NKUST_SCRAPE_SYLLABUS: '1'
        run: |
          echo "📚 開始爬取 ${{ inputs.year }} 學年度第 ${{ inputs.term }} 學期課程（含課綱）..."
          echo "⚠️ 使用舊版爬蟲 (ag202) 以取得課綱資料"
          npm run scrape:nkust-ag202
          echo "✓ 爬取完成"

      - name: 📥 Import to database (legacy importer)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NKUST_IMPORT_YEAR: ${{ inputs.year }}
          NKUST_IMPORT_TERM: ${{ inputs.term }}
        run: |
          echo "💾 開始匯入資料庫..."
          npm run db:import:nkust-ag202
          echo "✓ 匯入完成"

      - name: 📊 Verify import
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          YEAR=${{ inputs.year }}
          TERM=${{ inputs.term }}

          echo "正在驗證匯入結果..."

          COURSE_COUNT=$(psql "$DATABASE_URL" -t -c "
            SELECT COUNT(*)
            FROM \"Course\"
            WHERE year = '$YEAR' AND term = '$TERM';
          " | tr -d ' ')

          echo "📈 匯入統計："
          echo "  學期: $YEAR 學年度第 $TERM 學期"
          echo "  課程數: $COURSE_COUNT"

          if [ "$COURSE_COUNT" -lt 100 ]; then
            echo "❌ 課程數量異常偏低，可能匯入失敗"
            exit 1
          fi

          echo "✅ 驗證通過"

      - name: 📋 Summary
        if: always()
        run: |
          echo "✅ 完成匯入：${{ inputs.year }} 學年度第 ${{ inputs.term }} 學期（含課綱）"
